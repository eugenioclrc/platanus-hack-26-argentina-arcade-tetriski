<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tetriski — Neon Arcade</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #050816;
      color: #cfe3ff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    #game-root {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #game-root canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
    }
    .controls {
      position: fixed;
      bottom: 8px;
      left: 8px;
      font-size: 11px;
      color: #6a7a99;
      pointer-events: none;
      user-select: none;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div id="game-root"></div>
  <div class="controls">P1: WASD + U/I/O &nbsp;|&nbsp; P2: Arrows + R/T/Y &nbsp;|&nbsp; Start: 1/2</div>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.87.0/dist/phaser.min.js"></script>
  <script src="./game.js"></script>
</body>
</html>
